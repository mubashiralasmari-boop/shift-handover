<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SHIFT·PASS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060810;--s1:#0c1018;--s2:#111520;--s3:#171d2c;
  --border:#1a2438;--border2:#22304a;
  --cyan:#00d4ff;--green:#00e87a;--amber:#ffb300;--red:#ff3b5c;
  --text:#e0eaff;--dim:#3d5070;--dim2:#607090;
}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.screen{display:none;min-height:100dvh;flex-direction:column;}
.screen.active{display:flex;}

/* ══ SETUP SCREEN ══ */
#setupScreen{align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,212,255,.07) 0%,transparent 70%),var(--bg);}
.setup-box{width:100%;max-width:400px;}
.brand{text-align:center;margin-bottom:32px;}
.brand-icon{font-size:44px;margin-bottom:10px;}
.brand-name{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--cyan);letter-spacing:3px;}
.brand-sub{font-size:11px;color:var(--dim2);margin-top:4px;letter-spacing:.5px;}
.tabs{display:flex;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border2);}
.tab{flex:1;padding:10px;text-align:center;border-radius:7px;font-size:13px;cursor:pointer;color:var(--dim2);transition:all .2s;}
.tab.active{background:var(--s3);color:var(--text);font-weight:600;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.field{margin-bottom:14px;}
.field label{font-size:11px;color:var(--dim2);letter-spacing:.6px;display:block;margin-bottom:6px;}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--border2);border-radius:10px;padding:13px 15px;color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1);}
.inp::placeholder{color:var(--dim);}
.inp-mono{font-family:'IBM Plex Mono',monospace;letter-spacing:2px;}
.bed-slider{width:100%;accent-color:var(--cyan);margin-top:6px;}
.bed-count{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:700;color:var(--cyan);text-align:center;margin:8px 0;}
.main-btn{width:100%;background:var(--cyan);border:none;border-radius:11px;padding:14px;color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px;}
.main-btn:active{transform:scale(.97);}
.main-btn.ghost{background:transparent;border:1.5px solid var(--border2);color:var(--dim2);margin-top:8px;}
.generated-code{background:var(--s2);border:2px solid var(--cyan);border-radius:12px;padding:16px;text-align:center;margin-top:16px;display:none;}
.generated-code .code-val{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--cyan);letter-spacing:4px;}
.generated-code .code-hint{font-size:11px;color:var(--dim2);margin-top:6px;}
.copy-code-btn{margin-top:10px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:8px;padding:8px 20px;color:var(--cyan);font-size:12px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;}

/* ══ MAIN SCREEN ══ */
#mainScreen{background:var(--bg);}
.topbar{padding:11px 14px;border-bottom:1px solid var(--border);background:var(--s1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px;}
.unit-info{display:flex;align-items:center;gap:8px;min-width:0;}
.unit-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unit-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim2);background:var(--s2);border:1px solid var(--border2);border-radius:5px;padding:2px 7px;white-space:nowrap;}
.sync-row{display:flex;align-items:center;gap:6px;}
.sync-txt{font-size:10px;color:var(--dim2);font-family:'IBM Plex Mono',monospace;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.sync-dot.loading{background:var(--amber);animation:blink 1s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.topbar-btns{display:flex;gap:6px;flex-shrink:0;}
.tbtn{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;color:var(--dim2);font-size:12px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;white-space:nowrap;transition:all .15s;}
.tbtn:active{transform:scale(.95);}
.tbtn.green{color:var(--green);border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.07);}
.tbtn.red{color:var(--red);border-color:rgba(255,59,92,.25);}

.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--s1);}
.stat{flex:1;padding:8px 4px;text-align:center;border-left:1px solid var(--border);}
.stat:last-child{border-left:none;}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;}
.stat-n.r{color:var(--red);}
.stat-n.a{color:var(--amber);}
.stat-n.g{color:var(--green);}
.stat-n.w{color:var(--dim2);}
.stat-l{font-size:9px;color:var(--dim);margin-top:1px;}

/* ══ BED GRID ══ */
.beds-wrap{padding:12px;display:grid;gap:8px;}
.beds-wrap.cols-2{grid-template-columns:repeat(2,1fr);}
.beds-wrap.cols-3{grid-template-columns:repeat(3,1fr);}
.beds-wrap.cols-4{grid-template-columns:repeat(4,1fr);}

.bed{background:var(--s1);border:1.5px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;transition:all .15s;min-height:90px;display:flex;flex-direction:column;position:relative;}
.bed:active{transform:scale(.96);}
.bed.empty{border-style:dashed;opacity:.6;}
.bed.empty:hover{opacity:1;border-color:var(--border2);}
.bed.red{border-color:rgba(255,59,92,.5);background:rgba(255,59,92,.04);}
.bed.amber{border-color:rgba(255,179,0,.4);background:rgba(255,179,0,.03);}
.bed.green{border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.03);}
.bed-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.bed-dot{width:8px;height:8px;border-radius:50%;}
.bed-dot.red{background:var(--red);box-shadow:0 0 5px var(--red);}
.bed-dot.amber{background:var(--amber);box-shadow:0 0 5px var(--amber);}
.bed-dot.green{background:var(--green);box-shadow:0 0 4px var(--green);}
.bed-dot.empty{background:var(--dim);opacity:.3;}
.bed-name{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.bed-status{font-size:10px;color:var(--dim2);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.bed-waiting{font-size:10px;color:var(--amber);margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.bed-doctor{font-size:9px;color:var(--dim);margin-top:auto;padding-top:6px;}
.bed-empty-label{font-size:11px;color:var(--dim);text-align:center;margin:auto;}

/* ══ BED MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;border:1px solid var(--border2);border-bottom:none;padding:20px 18px 36px;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;animation:up .22s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-bed-num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--cyan);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:6px;padding:3px 10px;}
.fgroup{margin-bottom:13px;}
.flabel{font-size:11px;color:var(--dim2);letter-spacing:.5px;display:block;margin-bottom:5px;}
.finp{width:100%;background:var(--s2);border:1.5px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--text);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;outline:none;transition:border-color .2s;resize:none;}
.finp:focus{border-color:var(--cyan);}
.pri-row{display:flex;gap:7px;}
.pbtn{flex:1;padding:11px 6px;border-radius:9px;border:1.5px solid var(--border2);background:var(--s2);color:var(--dim2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.pbtn.r.on{border-color:var(--red);background:rgba(255,59,92,.12);color:var(--red);}
.pbtn.a.on{border-color:var(--amber);background:rgba(255,179,0,.1);color:var(--amber);}
.pbtn.g.on{border-color:var(--green);background:rgba(0,232,122,.1);color:var(--green);}
.mactions{display:flex;gap:8px;margin-top:16px;}
.msave{flex:1;background:var(--cyan);border:none;border-radius:10px;padding:13px;color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.mcancel{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:13px 16px;color:var(--dim2);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:14px;cursor:pointer;}
.mdischarge{background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.25);border-radius:10px;padding:13px 14px;color:var(--red);font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;cursor:pointer;}

/* ══ HANDOVER ══ */
#handoverScreen{padding:0;background:var(--bg);}
.ho-topbar{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--s1);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.back-btn{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:8px 13px;color:var(--dim2);font-size:13px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;}
.ho-title{font-size:16px;font-weight:700;flex:1;}
.ho-share{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);border-radius:8px;padding:8px 13px;color:var(--green);font-size:13px;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;}
.ho-body{padding:14px 14px 80px;}
.ho-meta{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.ho-meta-left{text-align:right;}
.ho-meta-unit{font-size:17px;font-weight:700;}
.ho-meta-code{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cyan);margin-top:3px;}
.ho-meta-right{text-align:left;}
.ho-meta-time{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--cyan);}
.ho-meta-date{font-size:11px;color:var(--dim2);margin-top:2px;}
.ho-summary{display:flex;gap:7px;margin-bottom:16px;}
.ho-sum-box{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.ho-sum-box.r{border-color:rgba(255,59,92,.3);background:rgba(255,59,92,.04);}
.ho-sum-box.a{border-color:rgba(255,179,0,.25);}
.ho-sum-box.g{border-color:rgba(0,232,122,.2);}
.ho-sum-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;}
.ho-sum-box.r .ho-sum-n{color:var(--red);}
.ho-sum-box.a .ho-sum-n{color:var(--amber);}
.ho-sum-box.g .ho-sum-n{color:var(--green);}
.ho-sum-box.e .ho-sum-n{color:var(--dim2);}
.ho-sum-l{font-size:9px;color:var(--dim);margin-top:2px;}
.ho-section{margin-bottom:18px;}
.ho-sec-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ho-sec-line{flex:1;height:1px;background:var(--border);}
.ho-sec-label{font-size:10px;color:var(--dim2);letter-spacing:.8px;white-space:nowrap;}
.ho-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;overflow:hidden;}
.ho-card.r{border-color:rgba(255,59,92,.45);background:rgba(255,59,92,.025);}
.ho-card.a{border-color:rgba(255,179,0,.35);}
.ho-card.g{border-color:rgba(0,232,122,.25);}
.ho-card-top{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}
.ho-bed-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;flex-shrink:0;margin-top:2px;}
.ho-bed-badge.r{background:rgba(255,59,92,.15);color:var(--red);border:1px solid rgba(255,59,92,.3);}
.ho-bed-badge.a{background:rgba(255,179,0,.12);color:var(--amber);border:1px solid rgba(255,179,0,.25);}
.ho-bed-badge.g{background:rgba(0,232,122,.1);color:var(--green);border:1px solid rgba(0,232,122,.2);}
.ho-card-name{font-size:15px;font-weight:700;flex:1;line-height:1.3;}
.ho-pri-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.ho-pri-dot.r{background:var(--red);box-shadow:0 0 6px var(--red);}
.ho-pri-dot.a{background:var(--amber);box-shadow:0 0 5px var(--amber);}
.ho-pri-dot.g{background:var(--green);box-shadow:0 0 4px var(--green);}
.ho-card-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px;}
.ho-field{display:flex;gap:8px;align-items:flex-start;}
.ho-field-label{font-size:10px;color:var(--dim2);letter-spacing:.4px;min-width:52px;padding-top:2px;flex-shrink:0;}
.ho-field-val{font-size:13px;color:var(--text);line-height:1.5;flex:1;}
.ho-field-val.waiting{color:var(--amber);}
.ho-card-footer{padding:7px 14px;background:rgba(255,255,255,.02);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ho-footer-doc{font-size:11px;color:var(--dim2);}
.ho-footer-doc span{color:var(--text);}
.ho-footer-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--s2);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:10px 22px;border-radius:20px;transition:all .2s;z-index:300;pointer-events:none;opacity:0;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ══ RECENT UNITS ══ */
.recent-wrap{margin-top:20px;}
.recent-title{font-size:10px;color:var(--dim2);letter-spacing:.7px;margin-bottom:8px;}
.recent-list{display:flex;flex-direction:column;gap:6px;}
.recent-item{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;}
.recent-item:active{transform:scale(.97);}
.recent-item:hover{border-color:var(--cyan);}
.recent-icon{font-size:18px;flex-shrink:0;}
.recent-info{flex:1;min-width:0;}
.recent-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim2);margin-top:2px;}
.recent-arrow{color:var(--cyan);font-size:16px;flex-shrink:0;}
.recent-del{color:var(--dim);font-size:13px;padding:4px 8px;flex-shrink:0;opacity:.5;}
.recent-del:hover{opacity:1;color:var(--red);}

/* ══ MOBILE RESPONSIVE ══ */
@media (max-width: 480px){
  /* Setup */
  #setupScreen{padding:16px;justify-content:flex-start;padding-top:40px;}
  .brand{margin-bottom:24px;}
  .brand-icon{font-size:36px;}
  .brand-name{font-size:20px;}
  .inp{font-size:16px;} /* منع zoom على iOS */
  .finp{font-size:16px;}
  .main-btn{padding:16px;font-size:16px;}

  /* Topbar */
  .topbar{padding:9px 10px;}
  .unit-name{font-size:12px;}
  .unit-code{font-size:9px;padding:2px 5px;}
  .sync-txt{display:none;} /* أخفي الوقت — الدوت يكفي */
  .tbtn{padding:7px 9px;font-size:11px;}

  /* Stats */
  .stat-n{font-size:16px;}
  .stat-l{font-size:8px;}

  /* Beds grid — جوال صغير: عمودين دائماً */
  .beds-wrap.cols-3{grid-template-columns:repeat(2,1fr);}
  .beds-wrap.cols-4{grid-template-columns:repeat(2,1fr);}
  .bed{min-height:80px;padding:8px;}
  .bed-name{font-size:12px;}
  .bed-status{font-size:9px;}
  .bed-waiting{font-size:9px;}

  /* Modal — full screen على الجوال */
  .modal{padding:16px 14px 40px;border-radius:16px 16px 0 0;}
  .modal-head{margin-bottom:14px;}
  .modal-title{font-size:15px;}
  .fgroup{margin-bottom:11px;}
  .mactions{flex-wrap:wrap;}
  .msave{order:-1;flex-basis:100%;margin-bottom:8px;}
  .mcancel{flex:1;}
  .mdischarge{flex:1;}

  /* Handover */
  .ho-topbar{padding:10px 12px;}
  .ho-title{font-size:14px;}
  .ho-share{padding:7px 10px;font-size:12px;}
  .ho-body{padding:10px 10px 80px;}
  .ho-meta{flex-direction:column;text-align:center;gap:6px;}
  .ho-meta-left{text-align:center;}
  .ho-meta-right{text-align:center;}
  .ho-meta-unit{font-size:15px;}
  .ho-meta-time{font-size:18px;}
  .ho-sum-box{padding:8px 4px;}
  .ho-sum-n{font-size:18px;}
  .ho-sum-l{font-size:8px;}
  .ho-card-name{font-size:14px;}
  .ho-field-val{font-size:12px;}

  /* Toast */
  .toast{font-size:11px;padding:9px 16px;bottom:16px;}

  /* Recent units */
  .recent-item{padding:10px 12px;}
  .recent-name{font-size:12px;}
}

@media (max-width: 360px){
  .beds-wrap{gap:6px;padding:8px;}
  .bed{min-height:70px;padding:7px;}
  .bed-name{font-size:11px;}
  .tbtn{padding:6px 7px;font-size:10px;}
}

/* iOS safe area */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .modal{padding-bottom:calc(36px + env(safe-area-inset-bottom));}
  .toast{bottom:calc(16px + env(safe-area-inset-bottom));}
}
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div class="screen active" id="setupScreen">
  <div class="setup-box">
    <div class="brand">
      <div class="brand-icon">🏥</div>
      <div class="brand-name">SHIFT·PASS</div>
      <div class="brand-sub">نظام تسليم الشيفت</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('join')">دخول وحدة</div>
      <div class="tab" onclick="switchTab('create')">إنشاء وحدة جديدة</div>
    </div>

    <!-- JOIN -->
    <div class="tab-content active" id="tab-join">
      <div class="field">
        <label>كود الوحدة</label>
        <input class="inp inp-mono" id="joinCode" placeholder="KSH-ER-4829" maxlength="20" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field" id="joinPassField">
        <label>كلمة السر</label>
        <input class="inp" id="joinPass" type="password" placeholder="••••••">
      </div>
      <button class="main-btn" onclick="doJoin()">دخول ←</button>
      <div class="recent-wrap" id="recentWrap" style="display:none">
        <div class="recent-title">الوحدات السابقة</div>
        <div class="recent-list" id="recentList"></div>
      </div>
    </div>

    <!-- CREATE -->
    <div class="tab-content" id="tab-create">
      <div class="field">
        <label>اسم الوحدة / القسم</label>
        <input class="inp" id="createName" placeholder="مثال: طوارئ KSH">
      </div>
      <div class="field">
        <label>كلمة سر الوحدة</label>
        <input class="inp" id="createPass" type="password" placeholder="اختر كلمة سر يعرفها فريقك">
      </div>
      <div class="field">
        <label>عدد الأسرة: <span id="bedCountLabel" style="color:var(--cyan);font-family:'IBM Plex Mono',monospace">10</span></label>
        <input type="range" class="bed-slider" id="bedSlider" min="2" max="50" value="10" oninput="updateBedCount()">
      </div>

<script>
// ══ CONFIG ══
const SHEET_ID = '1066_ZhYPRwmZMGNIdAL4LNgD08X2kXVrulSTUYp8RGA';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyi4Y30fsmuau7E76Y6iLXIQQIjJO3AFLEWv67W3pEGmkPYZDRwFM_KYWFKUrtVxBrB/exec';

let unitCode='', unitName='', bedCount=0, beds={}, selectedPri='amber', activeBed=null, autoRefreshTimer=null;

// ══ TABS ══
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='join'?0:1)));
  document.querySelectorAll('.tab-content').forEach((el,i)=>el.classList.toggle('active',i===(t==='join'?0:1)));
}

// ══ RECENT UNITS ══
function getRecentUnits(){
  try{return JSON.parse(localStorage.getItem('shiftpass_recent')||'[]');}catch{return[];}
}
function saveRecentUnit(code, name){
  let recent=getRecentUnits();
  // أزل لو موجود مسبقاً
  recent=recent.filter(u=>u.code!==code);
  // أضفه في الأول
  recent.unshift({code,name,lastVisit:new Date().toLocaleDateString('ar-SA')});
  // احتفظ بآخر 8 فقط
  recent=recent.slice(0,8);
  localStorage.setItem('shiftpass_recent',JSON.stringify(recent));
}
function removeRecentUnit(code,e){
  e.stopPropagation();
  let recent=getRecentUnits().filter(u=>u.code!==code);
  localStorage.setItem('shiftpass_recent',JSON.stringify(recent));
  renderRecentUnits();
}
function renderRecentUnits(){
  const recent=getRecentUnits();
  const wrap=document.getElementById('recentWrap');
  const list=document.getElementById('recentList');
  if(!recent.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML=recent.map(u=>`
    <div class="recent-item" onclick="quickJoin('${u.code}','${u.name}')">
      <div class="recent-icon">🏥</div>
      <div class="recent-info">
        <div class="recent-name">${u.name}</div>
        <div class="recent-code">${u.code} · ${u.lastVisit||''}</div>
      </div>
      <div class="recent-arrow">←</div>
      <div class="recent-del" onclick="removeRecentUnit('${u.code}',event)" title="حذف">✕</div>
    </div>
  `).join('');
}

function quickJoin(code, name){
  // لو الجهاز يعرف كلمة السر — ادخل مباشرة
  const savedPass=localStorage.getItem('pass_'+code);
  if(savedPass){
    loadUnit(code);
    return;
  }
  // لو ما يعرف — اطلب كلمة السر
  document.getElementById('joinCode').value=code;
  document.getElementById('joinPass').value='';
  document.getElementById('joinPass').focus();
  toast('أدخل كلمة سر وحدة: '+name);
}

// استدعاء عند فتح الصفحة
document.addEventListener('DOMContentLoaded', renderRecentUnits);

function updateBedCount(){
  document.getElementById('bedCountLabel').textContent=document.getElementById('bedSlider').value;
}

// ══ CREATE ══
function doCreate(){
  const name=document.getElementById('createName').value.trim();
  const pass=document.getElementById('createPass').value.trim();
  if(!name){toast('أدخل اسم الوحدة');return;}
  if(!pass){toast('أدخل كلمة سر للوحدة');return;}
  const n=parseInt(document.getElementById('bedSlider').value);
  const suffix=Math.random().toString(36).substr(2,4).toUpperCase();
  const prefix=name.replace(/\s+/g,'').substring(0,4).toUpperCase();
  const code=prefix+'-'+suffix;
  document.getElementById('codeVal').textContent=code;
  document.getElementById('generatedCode').style.display='block';
  // حفظ محلي مع كلمة السر
  const meta={name,bedCount:n,code,created:new Date().toISOString()};
  localStorage.setItem('unit_'+code, JSON.stringify(meta));
  localStorage.setItem('pass_'+code, pass); // كلمة السر محلياً فقط
  // تهيئة الأسرة فارغة
  const b={};
  for(let i=1;i<=n;i++) b[i]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
  localStorage.setItem('beds_'+code, JSON.stringify(b));
}

function enterWithCode(){
  const code=document.getElementById('codeVal').textContent;
  const pass=document.getElementById('createPass').value.trim();
  if(code==='—') return;
  // حفظ كلمة السر مؤقتاً لاستخدامها في الدخول
  localStorage.setItem('pass_'+code, pass);
  loadUnit(code);
}

function copyCode(){
  const code=document.getElementById('codeVal').textContent;
  navigator.clipboard?.writeText(code).catch(()=>{});
  toast('✓ تم نسخ الكود: '+code);
}

// ══ JOIN ══
function doJoin(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  const pass=document.getElementById('joinPass').value.trim();
  if(!code){toast('أدخل كود الوحدة');return;}
  if(!pass){toast('أدخل كلمة السر');return;}
  // تحقق من كلمة السر لو الوحدة موجودة محلياً
  const savedPass=localStorage.getItem('pass_'+code);
  if(savedPass && savedPass!==pass){toast('⚠️ كلمة السر غير صحيحة');return;}
  // حفظ كلمة السر للجهاز الجديد
  localStorage.setItem('pass_'+code, pass);
  loadUnit(code);
}


function enterMain(){
  document.getElementById('topUnitName').textContent=unitName;
  document.getElementById('topUnitCode').textContent=unitCode;
  // حفظ في السابقة
  saveRecentUnit(unitCode, unitName);
  // grid cols
  const wrap=document.getElementById('bedsWrap');
  wrap.className='beds-wrap '+(bedCount<=6?'cols-2':bedCount<=15?'cols-3':'cols-4');
  switchScreen('mainScreen');
  renderBeds();
  startAutoRefresh();
}

// ══ RENDER BEDS ══
function renderBeds(){
  const wrap=document.getElementById('bedsWrap');
  let html='';
  for(let i=1;i<=bedCount;i++){
    const b=beds[i]||{};
    const hasPatient=!!b.name;
    const pri=b.pri||'';
    html+=`<div class="bed ${hasPatient?pri:'empty'}" onclick="openBed(${i})">
      <div class="bed-num">
        <span>سرير ${i}</span>
        <div class="bed-dot ${hasPatient?pri:'empty'}"></div>
      </div>
      ${hasPatient?`
        <div class="bed-name">${b.name}</div>
        <div class="bed-status">${b.status||''}</div>
        ${b.waiting?`<div class="bed-waiting">⏳ ${b.waiting}</div>`:''}
        ${b.doctor?`<div class="bed-doctor">👨‍⚕️ ${b.doctor}</div>`:''}
      `:`<div class="bed-empty-label">فارغ<br><span style="font-size:9px;opacity:.5">اضغط للإضافة</span></div>`}
    </div>`;
  }
  wrap.innerHTML=html;
  updateStats();
}

function updateStats(){
  const vals=Object.values(beds);
  document.getElementById('cntR').textContent=vals.filter(b=>b.pri==='red'&&b.name).length;
  document.getElementById('cntA').textContent=vals.filter(b=>b.pri==='amber'&&b.name).length;
  document.getElementById('cntG').textContent=vals.filter(b=>b.pri==='green'&&b.name).length;
  document.getElementById('cntE').textContent=vals.filter(b=>!b.name).length;
}

// ══ BED MODAL ══
function openBed(num){
  activeBed=num;
  const b=beds[num]||{};
  document.getElementById('mTitle').textContent='سرير '+num;
  document.getElementById('mBedNum').textContent='سرير '+num;
  document.getElementById('fName').value=b.name||'';
  document.getElementById('fStatus').value=b.status||'';
  document.getElementById('fWaiting').value=b.waiting||'';
  document.getElementById('fDoctor').value=b.doctor||'';
  document.getElementById('dischargeBtn').style.display=b.name?'':'none';
  setPri(b.pri||'amber');
  document.getElementById('bedOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),300);
}

function closeBed(){document.getElementById('bedOverlay').classList.remove('open');}
function closeBedIfBg(e){if(e.target===document.getElementById('bedOverlay'))closeBed();}

function setPri(val,btn){
  selectedPri=val;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  if(btn){btn.classList.add('on');}
  else{
    const map={red:0,amber:1,green:2};
    document.querySelectorAll('.pbtn')[map[val]]?.classList.add('on');
  }
}

let isSyncing = false;

function saveBed(){
  const name=document.getElementById('fName').value.trim();
  const now=new Date();
  const t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  beds[activeBed]={
    name, status:document.getElementById('fStatus').value.trim(),
    waiting:document.getElementById('fWaiting').value.trim(),
    doctor:document.getElementById('fDoctor').value.trim(),
    pri:name?selectedPri:'', time:name?t:''
  };
  // احفظ محلياً أولاً فوراً
  saveLocal();
  closeBed();
  renderBeds();
  toast(name?'✓ تم الحفظ':'✓ تم إخلاء السرير');
  // بعدها أرسل للـ Sheet
  syncToSheet();
}

function dischargeBed(){
  if(!confirm('تأكيد إخلاء السرير؟')) return;
  beds[activeBed]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
  saveLocal();
  closeBed();
  renderBeds();
  toast('🚪 تم إخلاء السرير');
  syncToSheet();
}

// ══ STORAGE ══
function saveLocal(){
  localStorage.setItem('beds_'+unitCode, JSON.stringify(beds));
}

// ══ GOOGLE SHEETS SYNC ══
function setSyncStatus(status){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncTxt');
  if(status==='ok'){dot.className='sync-dot';txt.textContent=nowTime();}
  else if(status==='loading'){dot.className='sync-dot loading';txt.textContent='...';}
  else{dot.className='sync-dot err';txt.textContent='خطأ';}
}

function nowTime(){
  const n=new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function syncToSheet(){
  setSyncStatus('loading');
  const rows=[
    ['UNIT_CODE', unitCode],
    ['UNIT_NAME', unitName],
    ['BED_COUNT', bedCount],
    ['UPDATED', new Date().toLocaleString('ar-SA')],
    ['رقم السرير','اسم المريض','الوضع الحالي','ننتظر','الطبيب','الأولوية','وقت الإضافة']
  ];
  for(let i=1;i<=bedCount;i++){
    const b=beds[i]||{};
    const priAr={red:'🔴 حرج',amber:'🟡 متابعة',green:'🟢 مستقر'}[b.pri]||'فارغ';
    rows.push([
      'سرير '+i,
      b.name||'— فارغ',
      b.status||'',
      b.waiting||'',
      b.doctor||'',
      priAr,
      b.time||''
    ]);
  }
  const secret = localStorage.getItem('pass_'+unitCode)||'';
  const url = SCRIPT_URL
    + '?code=' + encodeURIComponent(unitCode)
    + '&secret=' + encodeURIComponent(secret)
    + '&data=' + encodeURIComponent(JSON.stringify(rows));
  fetch(url, {mode:'no-cors'})
    .then(()=>setSyncStatus('ok'))
    .catch(()=>setSyncStatus('err'));
}

function loadUnit(code){
  const secret = localStorage.getItem('pass_'+code)||'';
  const meta = localStorage.getItem('unit_'+code);
  // دائماً اجلب أحدث بيانات من الـ Sheet
  toast('🔄 جاري التحميل...');
  setSyncStatus('loading');
  const url = SCRIPT_URL
    + '?action=read'
    + '&code=' + encodeURIComponent(code)
    + '&secret=' + encodeURIComponent(secret);
  fetch(url)
    .then(r=>r.json())
    .then(res=>{
      if(res.error === 'unauthorized'){
        toast('⚠️ كلمة السر غير صحيحة');
        localStorage.removeItem('pass_'+code);
        return;
      }
      if(res.error === 'notfound'){
        // لو ما في Sheet — جرب محلياً
        if(meta){
          const m=JSON.parse(meta);
          unitCode=code; unitName=m.name; bedCount=m.bedCount;
          const savedBeds=localStorage.getItem('beds_'+code);
          beds=savedBeds?JSON.parse(savedBeds):{};
          if(!Object.keys(beds).length){
            for(let i=1;i<=bedCount;i++) beds[i]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
          }
          enterMain();
        } else {
          toast('⚠️ الكود غير موجود — تأكد من الكود');
        }
        return;
      }
      if(res.ok){
        const rows = res.data;
        let name='', bedCnt=0, bs={};
        rows.forEach(row=>{
          const key = String(row[0]||'').trim();
          if(key==='UNIT_NAME'){ name=String(row[1]||''); return; }
          if(key==='BED_COUNT'){ bedCnt=parseInt(row[1])||0; return; }
          const m = key.match(/^سرير\s+(\d+)$/);
          if(m){
            const n=parseInt(m[1]);
            const priMap={'🔴 حرج':'red','🟡 متابعة':'amber','🟢 مستقر':'green'};
            bs[n]={
              name: String(row[1]||'')==='— فارغ'?'':String(row[1]||''),
              status: String(row[2]||''),
              waiting: String(row[3]||''),
              doctor: String(row[4]||''),
              pri: priMap[String(row[5]||'')]||'',
              time: String(row[6]||'')
            };
          }
        });
        // لو ما لقينا اسم أو عدد — استخدم المحلي
        if(!name && meta) name=JSON.parse(meta).name||code;
        // عدد الأسرة: من الـ Sheet أولاً، ثم من المحلي، ثم احسبه من الأسرة الموجودة
        if(!bedCnt && meta) bedCnt=JSON.parse(meta).bedCount||0;
        if(!bedCnt) bedCnt=Math.max(...Object.keys(bs).map(Number), 10);
        // تأكد كل الأسرة موجودة
        for(let i=1;i<=bedCnt;i++){
          if(!bs[i]) bs[i]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
        }
        unitCode=code; unitName=name; bedCount=bedCnt; beds=bs;
        localStorage.setItem('unit_'+code, JSON.stringify({name,bedCount:bedCnt,code}));
        localStorage.setItem('beds_'+code, JSON.stringify(bs));
        enterMain();
      }
    })
    .catch(()=>{
      // لو فشل الاتصال — استخدم المحلي
      if(meta){
        const m=JSON.parse(meta);
        unitCode=code; unitName=m.name; bedCount=m.bedCount;
        const savedBeds=localStorage.getItem('beds_'+code);
        beds=savedBeds?JSON.parse(savedBeds):{};
        if(!Object.keys(beds).length){
          for(let i=1;i<=bedCount;i++) beds[i]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
        }
        enterMain();
        toast('⚠️ بدون إنترنت — بيانات محلية');
      } else {
        toast('⚠️ تعذر الاتصال — تحقق من الإنترنت');
      }
    });
}

function doRefresh(){
  // اقرأ دائماً من المحلي أولاً — هو المصدر الصح
  const saved = localStorage.getItem('beds_'+unitCode);
  if(saved) beds = JSON.parse(saved);
  renderBeds();
  setSyncStatus('loading');
  // ارسل للـ Sheet ليتحدث
  syncToSheet();
}

function startAutoRefresh(){
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  setSyncStatus('ok');
  // كل 60 ثانية — فقط نرسل للـ Sheet، ما نقرأ منه (المحلي هو المصدر)
  autoRefreshTimer=setInterval(()=>{
    syncToSheet();
  }, 60000);
}

// ══ HANDOVER ══
function showHandover(){
  buildHandover();
  switchScreen('handoverScreen');
}

function buildHandover(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('ar-SA');
  const timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const occupied=Object.entries(beds).filter(([,b])=>b.name).sort((a,b)=>{
    const o={red:0,amber:1,green:2};
    return (o[a[1].pri]??3)-(o[b[1].pri]??3);
  });
  const red=occupied.filter(([,b])=>b.pri==='red');
  const amber=occupied.filter(([,b])=>b.pri==='amber');
  const green=occupied.filter(([,b])=>b.pri==='green');
  const empty=bedCount-occupied.length;

  const cardHtml=([num,b],cls)=>`
    <div class="ho-card ${cls}">
      <div class="ho-card-top">
        <div class="ho-bed-badge ${cls}">سرير ${num}</div>
        <div class="ho-card-name">${b.name}</div>
        <div class="ho-pri-dot ${cls}"></div>
      </div>
      <div class="ho-card-body">
        ${b.status?`<div class="ho-field">
          <div class="ho-field-label">الوضع</div>
          <div class="ho-field-val">${b.status}</div>
        </div>`:''}
        <div class="ho-field">
          <div class="ho-field-label">ننتظر</div>
          <div class="ho-field-val ${b.waiting?'waiting':''}">${b.waiting||'— لا يوجد'}</div>
        </div>
      </div>
      <div class="ho-card-footer">
        <div class="ho-footer-doc">${b.doctor?'👨‍⚕️ <span>'+b.doctor+'</span>':'<span style="color:var(--dim)">—</span>'}</div>
        <div class="ho-footer-time">${b.time||''}</div>
      </div>
    </div>`;

  const secHtml=(title,arr,cls)=>arr.length?`
    <div class="ho-section">
      <div class="ho-sec-header">
        <div class="ho-sec-label">${title} — ${arr.length}</div>
        <div class="ho-sec-line"></div>
      </div>
      ${arr.map(e=>cardHtml(e,cls)).join('')}
    </div>`:'';

  document.getElementById('hoBody').innerHTML=`
    <div class="ho-meta">
      <div class="ho-meta-left">
        <div class="ho-meta-unit">${unitName}</div>
        <div class="ho-meta-code">${unitCode}</div>
      </div>
      <div class="ho-meta-right">
        <div class="ho-meta-time">${timeStr}</div>
        <div class="ho-meta-date">${dateStr}</div>
      </div>
    </div>
    <div class="ho-summary">
      <div class="ho-sum-box r"><div class="ho-sum-n">${red.length}</div><div class="ho-sum-l">🔴 حرج</div></div>
      <div class="ho-sum-box a"><div class="ho-sum-n">${amber.length}</div><div class="ho-sum-l">🟡 متابعة</div></div>
      <div class="ho-sum-box g"><div class="ho-sum-n">${green.length}</div><div class="ho-sum-l">🟢 مستقر</div></div>
      <div class="ho-sum-box e"><div class="ho-sum-n">${empty}</div><div class="ho-sum-l">⬜ فارغ</div></div>
    </div>
    ${secHtml('🔴 حرج — متابعة فورية',red,'r')}
    ${secHtml('🟡 متابعة',amber,'a')}
    ${secHtml('🟢 مستقر',green,'g')}
    ${!occupied.length?'<div style="text-align:center;padding:60px;color:var(--dim);font-size:14px">✅ لا يوجد مرضى للتسليم</div>':''}
  `;
}

function shareHandover(){
  const now=new Date();
  const occupied=Object.entries(beds).filter(([,b])=>b.name)
    .sort((a,b)=>({red:0,amber:1,green:2}[a[1].pri]??3)-({red:0,amber:1,green:2}[b[1].pri]??3));
  const priLabel={red:'🔴 حرج',amber:'🟡 متابعة',green:'🟢 مستقر'};
  let txt=`📋 تسليم شيفت — ${unitName}\n`;
  txt+=`🏥 ${unitCode} | ${now.toLocaleDateString('ar-SA')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}\n`;
  txt+=`المرضى: ${occupied.length} | الأسرة الفارغة: ${bedCount-occupied.length}\n\n`;
  occupied.forEach(([num,b])=>{
    txt+=`سرير ${num}: ${b.name} — ${priLabel[b.pri]||''}\n`;
    if(b.status) txt+=`  الوضع: ${b.status}\n`;
    if(b.waiting) txt+=`  ننتظر: ${b.waiting}\n`;
    if(b.doctor) txt+=`  د. ${b.doctor}\n`;
    txt+='\n';
  });
  if(navigator.share){navigator.share({title:'تسليم الشيفت',text:txt}).catch(()=>{});}
  else{
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('✓ تم نسخ التسليم');
  }
}

// ══ SCREENS / NAV ══
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goBack(){switchScreen('mainScreen');}
function doExit(){
  if(autoRefreshTimer) clearInterval(autoRefreshTimer);
  switchScreen('setupScreen');
  renderRecentUnits();
}

// ══ TOAST ══
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ══ ENTER KEY ══
document.getElementById('joinCode').addEventListener('keydown',e=>{if(e.key==='Enter')doJoin();});
</script>
