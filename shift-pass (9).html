<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHIFT·PASS</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#111827;
  --s1:#1a2436;
  --s2:#1f2d42;
  --s3:#243350;
  --border:#2d4060;
  --border2:#3a5278;
  --cyan:#00d4ff;
  --green:#00e87a;
  --amber:#ffb300;
  --red:#ff3b5c;
  --text:#f4f7ff;
  --dim:#6b8ab0;
  --dim2:#9ab0cc;
}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;}
.screen{display:none;min-height:100dvh;flex-direction:column;}
.screen.active{display:flex;}

/* ══ SETUP ══ */
#setupScreen{
  align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,255,.12) 0%,transparent 65%),var(--bg);
}
.setup-box{width:100%;max-width:420px;}
.brand{text-align:center;margin-bottom:36px;}
.brand-icon{font-size:48px;margin-bottom:12px;display:block;}
.brand-name{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;color:var(--cyan);letter-spacing:4px;}
.brand-sub{font-size:12px;color:var(--dim2);margin-top:6px;letter-spacing:.5px;}

.tabs{display:flex;background:var(--s1);border-radius:12px;padding:4px;margin-bottom:20px;border:1px solid var(--border);}
.tab{flex:1;padding:11px;text-align:center;border-radius:9px;font-size:13px;cursor:pointer;color:var(--dim2);transition:all .2s;font-family:'IBM Plex Sans Arabic',sans-serif;}
.tab.active{background:var(--s3);color:var(--text);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.field{margin-bottom:16px;}
.field label{font-size:11px;color:var(--dim2);letter-spacing:.8px;display:block;margin-bottom:7px;text-transform:uppercase;}
.inp{
  width:100%;background:var(--s2);border:1.5px solid var(--border);
  border-radius:11px;padding:14px 16px;color:var(--text);
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:16px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.12);}
.inp::placeholder{color:var(--dim);}
.inp-mono{font-family:'IBM Plex Mono',monospace;letter-spacing:2px;text-align:center;}

.slider-wrap{padding:6px 0;}
.bed-count-display{
  font-family:'IBM Plex Mono',monospace;font-size:40px;font-weight:700;
  color:var(--cyan);text-align:center;margin-bottom:10px;
}
.bed-slider{width:100%;accent-color:var(--cyan);height:6px;cursor:pointer;}

.main-btn{
  width:100%;background:var(--cyan);border:none;border-radius:12px;
  padding:15px;color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:6px;
}
.main-btn:hover{background:#33ddff;transform:translateY(-1px);}
.main-btn:active{transform:scale(.97);}
.main-btn.ghost{background:transparent;border:1.5px solid var(--border2);color:var(--dim2);margin-top:10px;}
.main-btn.ghost:hover{background:var(--s2);color:var(--text);}

.code-box{
  background:var(--s2);border:2px solid var(--cyan);border-radius:14px;
  padding:20px;text-align:center;margin-top:18px;display:none;
}
.code-val{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:700;color:var(--cyan);letter-spacing:5px;}
.code-hint{font-size:11px;color:var(--dim2);margin-top:6px;}
.copy-btn{
  margin-top:12px;background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);
  border-radius:8px;padding:9px 22px;color:var(--cyan);font-size:12px;cursor:pointer;
  font-family:'IBM Plex Sans Arabic',sans-serif;transition:all .2s;
}
.copy-btn:hover{background:rgba(0,212,255,.2);}

.recent-wrap{margin-top:20px;}
.recent-label{font-size:11px;color:var(--dim);letter-spacing:.8px;margin-bottom:10px;text-align:center;}
.recent-item{
  display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:var(--s1);border:1px solid var(--border);border-radius:11px;
  margin-bottom:8px;cursor:pointer;transition:all .2s;
}
.recent-item:hover{background:var(--s2);border-color:var(--border2);}
.recent-icon{font-size:20px;}
.recent-info{flex:1;}
.recent-name{font-size:13px;font-weight:600;color:var(--text);}
.recent-code{font-size:11px;color:var(--dim2);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.recent-arrow{color:var(--cyan);font-size:16px;}
.recent-del{color:var(--dim);font-size:13px;padding:4px 8px;border-radius:6px;}
.recent-del:hover{color:var(--red);background:rgba(255,59,92,.1);}

/* ══ MAIN SCREEN ══ */
#mainScreen{background:var(--bg);}
.topbar{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--s1);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.top-btn{
  background:transparent;border:1px solid var(--border2);border-radius:9px;
  padding:8px 14px;color:var(--dim2);font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;
}
.top-btn:hover{background:var(--s2);color:var(--text);}
.top-btn.exit{color:var(--red);border-color:rgba(255,59,92,.3);}
.top-btn.exit:hover{background:rgba(255,59,92,.1);}
.top-btn.handover{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:700;}
.top-btn.handover:hover{background:#33ddff;}
.sync-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim2);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);transition:all .3s;}
.sync-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.top-spacer{flex:1;}
.unit-badge{
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;
  color:var(--cyan);background:rgba(0,212,255,.1);
  border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:6px 12px;
}

/* ══ STATS ══ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border);}
.stat{
  padding:14px 10px;text-align:center;border-left:1px solid var(--border);
  background:var(--s1);
}
.stat:last-child{border-left:none;}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;line-height:1;}
.stat-l{font-size:10px;color:var(--dim2);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:3px;}
.stat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.stat.empty .stat-n{color:var(--dim2);}
.stat.green-s .stat-n{color:var(--green);}
.stat.amber-s .stat-n{color:var(--amber);}
.stat.red-s .stat-n{color:var(--red);}

/* ══ BEDS ══ */
.beds-wrap{display:grid;gap:10px;padding:14px;}
.beds-wrap.cols-2{grid-template-columns:repeat(2,1fr);}
.beds-wrap.cols-3{grid-template-columns:repeat(3,1fr);}
.beds-wrap.cols-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:500px){.beds-wrap.cols-3,.beds-wrap.cols-4{grid-template-columns:repeat(2,1fr);}}

.bed{
  background:var(--s1);border:1.5px solid var(--border);border-radius:14px;
  padding:13px;cursor:pointer;transition:all .18s;min-height:100px;
  display:flex;flex-direction:column;
}
.bed:hover{border-color:var(--border2);background:var(--s2);transform:translateY(-1px);}
.bed.red{border-color:rgba(255,59,92,.5);background:rgba(255,59,92,.06);}
.bed.amber{border-color:rgba(255,179,0,.4);background:rgba(255,179,0,.05);}
.bed.green{border-color:rgba(0,232,122,.35);background:rgba(0,232,122,.04);}

.bed-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.bed-num{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--dim2);}
.bed-dot{width:9px;height:9px;border-radius:50%;background:var(--border2);}
.bed-dot.red{background:var(--red);}
.bed-dot.amber{background:var(--amber);}
.bed-dot.green{background:var(--green);}

.bed-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;}
.bed-status{font-size:11px;color:var(--dim2);line-height:1.4;}
.bed-waiting{font-size:11px;color:var(--amber);margin-top:3px;}
.bed-doctor{font-size:11px;color:var(--dim2);margin-top:2px;}
.bed-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;flex-direction:column;gap:4px;}
.bed-empty-plus{font-size:22px;color:var(--border2);}

/* ══ MODAL ══ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all;}
.modal{
  width:100%;max-width:480px;background:var(--s1);
  border-radius:20px 20px 0 0;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  border-top:1px solid var(--border2);max-height:90dvh;overflow-y:auto;
}
.overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--text);}
.modal-field{margin-bottom:14px;}
.modal-field label{font-size:11px;color:var(--dim2);letter-spacing:.6px;display:block;margin-bottom:6px;}
.modal-inp{
  width:100%;background:var(--s2);border:1.5px solid var(--border);
  border-radius:10px;padding:13px 14px;color:var(--text);
  font-family:'IBM Plex Sans Arabic',sans-serif;font-size:16px;
  outline:none;transition:border-color .2s;
}
.modal-inp:focus{border-color:var(--cyan);}
.modal-inp::placeholder{color:var(--dim);}

.pri-row{display:flex;gap:8px;margin-bottom:18px;}
.pbtn{
  flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--s2);color:var(--dim2);font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:12px;cursor:pointer;transition:all .15s;text-align:center;
}
.pbtn.on.red{background:rgba(255,59,92,.15);border-color:var(--red);color:var(--red);}
.pbtn.on.amber{background:rgba(255,179,0,.15);border-color:var(--amber);color:var(--amber);}
.pbtn.on.green{background:rgba(0,232,122,.12);border-color:var(--green);color:var(--green);}

.modal-btns{display:flex;gap:10px;margin-top:6px;}
.save-btn{
  flex:1;background:var(--cyan);border:none;border-radius:11px;padding:14px;
  color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
}
.discharge-btn{
  background:rgba(255,59,92,.12);border:1.5px solid rgba(255,59,92,.3);border-radius:11px;
  padding:14px 18px;color:var(--red);font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:13px;cursor:pointer;white-space:nowrap;
}

/* ══ HANDOVER SCREEN ══ */
#handoverScreen{background:var(--bg);}
.ho-topbar{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--s1);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.ho-title{font-size:15px;font-weight:700;color:var(--text);}
.share-btn{
  background:var(--green);border:none;border-radius:9px;padding:9px 18px;
  color:#000;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;
}
.ho-body{padding:16px;max-width:700px;margin:0 auto;width:100%;}
.ho-meta{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px;background:var(--s1);border:1px solid var(--border);
  border-radius:14px;margin-bottom:14px;
}
.ho-unit{font-size:16px;font-weight:700;}
.ho-code{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim2);margin-top:3px;}
.ho-time{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--cyan);text-align:left;}
.ho-date{font-size:11px;color:var(--dim2);text-align:left;margin-top:3px;}

.ho-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.ho-sum{
  padding:12px 8px;text-align:center;border-radius:12px;border:1px solid var(--border);
  background:var(--s1);
}
.ho-sum-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;}
.ho-sum-l{font-size:10px;color:var(--dim2);margin-top:3px;}
.ho-sum.r .ho-sum-n{color:var(--red);}
.ho-sum.a .ho-sum-n{color:var(--amber);}
.ho-sum.g .ho-sum-n{color:var(--green);}
.ho-sum.e .ho-sum-n{color:var(--dim2);}

.ho-sec-label{font-size:12px;font-weight:700;color:var(--dim2);letter-spacing:.6px;
  text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.ho-sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

.ho-card{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:10px;
}
.ho-card.r{border-right:3px solid var(--red);}
.ho-card.a{border-right:3px solid var(--amber);}
.ho-card.g{border-right:3px solid var(--green);}
.ho-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.ho-badge{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:3px 9px;
  color:var(--dim2);
}
.ho-name{font-size:15px;font-weight:700;}
.ho-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ho-field-label{font-size:10px;color:var(--dim);letter-spacing:.5px;margin-bottom:3px;}
.ho-field-val{font-size:13px;color:var(--text);}
.ho-field-val.waiting{color:var(--amber);}
.ho-footer{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ho-doc{font-size:12px;color:var(--dim2);}
.ho-time-added{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--border2);border-radius:12px;
  padding:11px 22px;font-size:13px;color:var(--text);z-index:999;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ LOADING ══ */
.loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.loading-spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--dim2);}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="screen active" id="setupScreen">
  <div class="setup-box">
    <div class="brand">
      <span class="brand-icon">🏥</span>
      <div class="brand-name">SHIFT · PASS</div>
      <div class="brand-sub">نظام تسليم الشيفت</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('join')">دخول وحدة</div>
      <div class="tab" onclick="switchTab('create')">إنشاء وحدة جديدة</div>
    </div>

    <!-- JOIN -->
    <div class="tab-content active" id="tabJoin">
      <div class="field">
        <label>كود الوحدة</label>
        <input class="inp inp-mono" id="joinCode" placeholder="KSH-XXXX" maxlength="20" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doJoin()">
      </div>
      <div class="field">
        <label>كلمة السر</label>
        <input class="inp" id="joinPass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')doJoin()">
      </div>
      <button class="main-btn" onclick="doJoin()">دخول ←</button>
    </div>

    <!-- CREATE -->
    <div class="tab-content" id="tabCreate">
      <div class="field">
        <label>اسم الوحدة / القسم</label>
        <input class="inp" id="createName" placeholder="مثال: KSH-ACU">
      </div>
      <div class="field">
        <label>كلمة سر الوحدة</label>
        <input class="inp" id="createPass" type="password" placeholder="••••••">
      </div>
      <div class="field">
        <label>عدد الأسرة</label>
        <div class="slider-wrap">
          <div class="bed-count-display" id="bedCountLabel">10</div>
          <input class="bed-slider" type="range" min="1" max="40" value="10" id="bedSlider" oninput="document.getElementById('bedCountLabel').textContent=this.value">
        </div>
      </div>
      <button class="main-btn" onclick="doCreate()">إنشاء وحدة</button>
      <div class="code-box" id="generatedCode">
        <div class="code-val" id="codeVal">—</div>
        <div class="code-hint">شارك الكود مع فريقك</div>
        <button class="copy-btn" onclick="copyCode()">نسخ الكود</button>
        <button class="main-btn" style="margin-top:12px" onclick="enterWithCode()">دخول الوحدة ←</button>
      </div>
    </div>

    <!-- RECENT -->
    <div class="recent-wrap" id="recentWrap" style="display:none">
      <div class="recent-label">الوحدات السابقة</div>
      <div id="recentList"></div>
    </div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="screen" id="mainScreen">
  <div class="topbar">
    <button class="top-btn exit" onclick="doExit()">خروج</button>
    <button class="top-btn" onclick="doRefresh()" id="refreshBtn">↺</button>
    <button class="top-btn handover" onclick="showHandover()">تسليم 📋</button>
    <div class="top-spacer"></div>
    <div class="sync-wrap">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncTxt"></span>
    </div>
    <div class="unit-badge" id="topUnitCode"></div>
  </div>

  <div class="stats">
    <div class="stat empty"><div class="stat-n" id="cntE">0</div><div class="stat-l"><span class="stat-dot" style="background:var(--border2)"></span>فارغ</div></div>
    <div class="stat green-s"><div class="stat-n" id="cntG">0</div><div class="stat-l"><span class="stat-dot" style="background:var(--green)"></span>مستقر</div></div>
    <div class="stat amber-s"><div class="stat-n" id="cntA">0</div><div class="stat-l"><span class="stat-dot" style="background:var(--amber)"></span>متابعة</div></div>
    <div class="stat red-s"><div class="stat-n" id="cntR">0</div><div class="stat-l"><span class="stat-dot" style="background:var(--red)"></span>حرج</div></div>
  </div>

  <div class="beds-wrap cols-3" id="bedsWrap"></div>
</div>

<!-- HANDOVER SCREEN -->
<div class="screen" id="handoverScreen">
  <div class="ho-topbar">
    <button class="top-btn" onclick="goBack()">← رجوع</button>
    <div class="ho-title">ورقة التسليم</div>
    <div class="top-spacer"></div>
    <button class="share-btn" onclick="shareHandover()">مشاركة</button>
  </div>
  <div class="ho-body" id="hoBody"></div>
</div>

<!-- BED MODAL -->
<div class="overlay" id="bedOverlay" onclick="closeBedIfBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle">سرير</div>
    <div class="modal-field">
      <label>اسم المريض</label>
      <input class="modal-inp" id="fName" placeholder="الاسم الكامل">
    </div>
    <div class="modal-field">
      <label>الوضع الحالي</label>
      <input class="modal-inp" id="fStatus" placeholder="مثال: مستقر، تحت المراقبة...">
    </div>
    <div class="modal-field">
      <label>ننتظر</label>
      <input class="modal-inp" id="fWaiting" placeholder="مثال: نتيجة CT، رأي جراح...">
    </div>
    <div class="modal-field">
      <label>الطبيب المسؤول</label>
      <input class="modal-inp" id="fDoctor" placeholder="اسم الطبيب">
    </div>
    <div class="modal-field">
      <label>الأولوية</label>
      <div class="pri-row">
        <button class="pbtn red" onclick="setPri('red',this)">🔴 حرج</button>
        <button class="pbtn amber on" onclick="setPri('amber',this)">🟡 متابعة</button>
        <button class="pbtn green" onclick="setPri('green',this)">🟢 مستقر</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="save-btn" onclick="saveBed()">حفظ ✓</button>
      <button class="discharge-btn" id="dischargeBtn" onclick="dischargeBed()" style="display:none">إخلاء</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">جاري التحميل...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══ SUPABASE CONFIG ══
const SUPA_URL = 'https://zcxemdqxheiqjnzcslvk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjeGVtZHF4aGVpcWpuemNzbHZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTAzNjgsImV4cCI6MjA4ODQyNjM2OH0.GTnmZl-llHkW7BYgD6OltRtGI86zMVzdAoEePAD6uc8';

const H = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

// ══ STATE ══
let unitCode='', unitName='', bedCount=0, beds={}, activeBed=0, selectedPri='amber', autoTimer=null;

// ══ SUPABASE API ══
async function sbGet(table, filter=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}`, {headers:{...H,'Prefer':'return=representation'}});
  return r.json();
}
async function sbUpsert(table, data){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body: JSON.stringify(data)
  });
  return r.ok;
}
async function sbDelete(table, filter){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}`, {method:'DELETE', headers:H});
  return r.ok;
}

// ══ TABS ══
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='join'?0:1)));
  document.getElementById('tabJoin').classList.toggle('active',t==='join');
  document.getElementById('tabCreate').classList.toggle('active',t==='create');
}

// ══ CREATE ══
async function doCreate(){
  const name = document.getElementById('createName').value.trim();
  const pass = document.getElementById('createPass').value.trim();
  if(!name){toast('أدخل اسم الوحدة');return;}
  if(!pass){toast('أدخل كلمة سر');return;}
  const n = parseInt(document.getElementById('bedSlider').value);
  const suffix = Math.random().toString(36).substr(2,4).toUpperCase();
  const prefix = name.replace(/\s+/g,'').substring(0,4).toUpperCase();
  const code = prefix+'-'+suffix;

  showLoading('جاري إنشاء الوحدة...');
  // حفظ في Supabase
  const ok = await sbUpsert('units', {code, name, bed_count:n, password_hash:pass});
  hideLoading();
  if(!ok){toast('⚠️ خطأ في الإنشاء — تحقق من الاتصال');return;}

  document.getElementById('codeVal').textContent = code;
  document.getElementById('generatedCode').style.display = 'block';
  // حفظ محلي
  localStorage.setItem('pass_'+code, pass);
  localStorage.setItem('unit_'+code, JSON.stringify({name,bedCount:n,code}));
}

function enterWithCode(){
  const code = document.getElementById('codeVal').textContent;
  if(code==='—') return;
  loadUnit(code);
}

function copyCode(){
  const code = document.getElementById('codeVal').textContent;
  navigator.clipboard?.writeText(code).catch(()=>{});
  toast('✓ تم نسخ الكود: '+code);
}

// ══ JOIN ══
async function doJoin(){
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  const pass = document.getElementById('joinPass').value.trim();
  if(!code){toast('أدخل كود الوحدة');return;}
  if(!pass){toast('أدخل كلمة السر');return;}

  showLoading('جاري التحقق...');
  const units = await sbGet('units', `code=eq.${encodeURIComponent(code)}&select=*`);
  hideLoading();

  if(!units || !units.length){toast('⚠️ الكود غير موجود');return;}
  if(units[0].password_hash !== pass){toast('⚠️ كلمة السر غير صحيحة');return;}

  localStorage.setItem('pass_'+code, pass);
  localStorage.setItem('unit_'+code, JSON.stringify({name:units[0].name, bedCount:units[0].bed_count, code}));
  loadUnit(code);
}

// ══ LOAD UNIT ══
async function loadUnit(code){
  const meta = localStorage.getItem('unit_'+code);
  const pass = localStorage.getItem('pass_'+code)||'';

  showLoading('جاري تحميل الأسرة...');

  // تحقق كلمة السر
  const units = await sbGet('units', `code=eq.${encodeURIComponent(code)}&select=*`);
  if(!units || !units.length){hideLoading();toast('⚠️ الكود غير موجود');return;}
  if(units[0].password_hash !== pass){hideLoading();toast('⚠️ كلمة السر غير صحيحة');return;}

  unitCode = code;
  unitName = units[0].name;
  bedCount = units[0].bed_count;

  // حمّل الأسرة
  await loadBeds();
  hideLoading();
  saveRecentUnit(code, unitName);
  enterMain();
}

async function loadBeds(){
  const rows = await sbGet('beds', `unit_code=eq.${encodeURIComponent(unitCode)}&order=bed_number.asc`);
  beds = {};
  for(let i=1;i<=bedCount;i++) beds[i]={name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
  if(rows && rows.length){
    rows.forEach(r=>{
      beds[r.bed_number]={
        name:r.patient_name||'', status:r.status||'',
        waiting:r.waiting||'', doctor:r.doctor||'',
        pri:r.priority||'', time:r.time_added||''
      };
    });
  }
}

// ══ ENTER MAIN ══
function enterMain(){
  document.getElementById('topUnitCode').textContent = unitCode;
  const wrap = document.getElementById('bedsWrap');
  wrap.className = 'beds-wrap '+(bedCount<=6?'cols-2':bedCount<=15?'cols-3':'cols-4');
  switchScreen('mainScreen');
  renderBeds();
  startAutoRefresh();
}

// ══ RENDER ══
function renderBeds(){
  const wrap = document.getElementById('bedsWrap');
  let html = '';
  for(let i=1;i<=bedCount;i++){
    const b = beds[i]||{};
    const has = !!b.name;
    html += `<div class="bed ${has?b.pri:''}" onclick="openBed(${i})">
      <div class="bed-top">
        <span class="bed-num">سرير ${i}</span>
        <div class="bed-dot ${has?b.pri:''}"></div>
      </div>
      ${has?`
        <div class="bed-name">${b.name}</div>
        ${b.status?`<div class="bed-status">${b.status}</div>`:''}
        ${b.waiting?`<div class="bed-waiting">⏳ ${b.waiting}</div>`:''}
        ${b.doctor?`<div class="bed-doctor">👨‍⚕️ ${b.doctor}</div>`:''}
      `:`<div class="bed-empty"><div class="bed-empty-plus">+</div><span>فارغ</span></div>`}
    </div>`;
  }
  wrap.innerHTML = html;
  updateStats();
}

function updateStats(){
  const vals = Object.values(beds);
  document.getElementById('cntR').textContent = vals.filter(b=>b.pri==='red'&&b.name).length;
  document.getElementById('cntA').textContent = vals.filter(b=>b.pri==='amber'&&b.name).length;
  document.getElementById('cntG').textContent = vals.filter(b=>b.pri==='green'&&b.name).length;
  document.getElementById('cntE').textContent = vals.filter(b=>!b.name).length;
}

// ══ BED MODAL ══
function openBed(num){
  activeBed = num;
  const b = beds[num]||{};
  document.getElementById('mTitle').textContent = 'سرير '+num;
  document.getElementById('fName').value = b.name||'';
  document.getElementById('fStatus').value = b.status||'';
  document.getElementById('fWaiting').value = b.waiting||'';
  document.getElementById('fDoctor').value = b.doctor||'';
  document.getElementById('dischargeBtn').style.display = b.name?'':'none';
  setPri(b.pri||'amber');
  document.getElementById('bedOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),350);
}
function closeBed(){document.getElementById('bedOverlay').classList.remove('open');}
function closeBedIfBg(e){if(e.target===document.getElementById('bedOverlay'))closeBed();}
function setPri(val,btn){
  selectedPri=val;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  else document.querySelectorAll('.pbtn')[{red:0,amber:1,green:2}[val]]?.classList.add('on');
}

async function saveBed(){
  const name = document.getElementById('fName').value.trim();
  const now = new Date();
  const t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const bedData = {
    name, status:document.getElementById('fStatus').value.trim(),
    waiting:document.getElementById('fWaiting').value.trim(),
    doctor:document.getElementById('fDoctor').value.trim(),
    pri:name?selectedPri:'', time:name?t:''
  };
  // حفظ محلي فوري
  beds[activeBed] = bedData;
  closeBed();
  renderBeds();
  toast(name?'✓ تم الحفظ':'✓ تم إخلاء السرير');
  // إرسال لـ Supabase
  setSyncStatus('loading');
  const ok = await sbUpsert('beds', {
    unit_code:unitCode, bed_number:activeBed,
    patient_name:bedData.name, status:bedData.status,
    waiting:bedData.waiting, doctor:bedData.doctor,
    priority:bedData.pri, time_added:bedData.time,
    updated_at: new Date().toISOString()
  });
  setSyncStatus(ok?'ok':'err');
}

async function dischargeBed(){
  if(!confirm('تأكيد إخلاء السرير؟')) return;
  beds[activeBed] = {name:'',status:'',waiting:'',doctor:'',pri:'',time:''};
  closeBed();
  renderBeds();
  toast('🚪 تم إخلاء السرير');
  setSyncStatus('loading');
  // احذف من Supabase أو اجعله فارغاً
  const ok = await sbUpsert('beds', {
    unit_code:unitCode, bed_number:activeBed,
    patient_name:'', status:'', waiting:'', doctor:'',
    priority:'', time_added:'', updated_at:new Date().toISOString()
  });
  setSyncStatus(ok?'ok':'err');
}

// ══ REFRESH ══
async function doRefresh(){
  setSyncStatus('loading');
  await loadBeds();
  renderBeds();
  setSyncStatus('ok');
}

function startAutoRefresh(){
  if(autoTimer) clearInterval(autoTimer);
  setSyncStatus('ok');
  autoTimer = setInterval(doRefresh, 15000); // كل 15 ثانية
}

// ══ SYNC STATUS ══
function setSyncStatus(s){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  if(s==='ok'){dot.className='sync-dot';txt.textContent='متزامن';}
  else if(s==='loading'){dot.className='sync-dot loading';txt.textContent='...';}
  else{dot.className='sync-dot err';txt.textContent='خطأ';}
}

// ══ HANDOVER ══
function showHandover(){
  buildHandover();
  switchScreen('handoverScreen');
}
function goBack(){switchScreen('mainScreen');}

function buildHandover(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('ar-SA');
  const timeStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const occupied = Object.entries(beds).filter(([,b])=>b.name)
    .sort((a,b)=>({red:0,amber:1,green:2}[a[1].pri]??3)-({red:0,amber:1,green:2}[b[1].pri]??3));
  const red = occupied.filter(([,b])=>b.pri==='red');
  const amber = occupied.filter(([,b])=>b.pri==='amber');
  const green = occupied.filter(([,b])=>b.pri==='green');
  const empty = bedCount - occupied.length;

  const card = ([num,b],cls) => `
    <div class="ho-card ${cls}">
      <div class="ho-card-top">
        <span class="ho-badge">سرير ${num}</span>
        <span class="ho-name">${b.name}</span>
      </div>
      <div class="ho-fields">
        <div><div class="ho-field-label">الوضع الحالي</div><div class="ho-field-val">${b.status||'—'}</div></div>
        <div><div class="ho-field-label">ننتظر</div><div class="ho-field-val ${b.waiting?'waiting':''}">${b.waiting||'— لا يوجد'}</div></div>
      </div>
      <div class="ho-footer">
        <div class="ho-doc">${b.doctor?'👨‍⚕️ '+b.doctor:'—'}</div>
        <div class="ho-time-added">${b.time||''}</div>
      </div>
    </div>`;

  const sec = (title,arr,cls) => arr.length?`
    <div class="ho-sec-label">${title} — ${arr.length}</div>
    ${arr.map(e=>card(e,cls)).join('')}`:'';

  document.getElementById('hoBody').innerHTML = `
    <div class="ho-meta">
      <div><div class="ho-unit">${unitName}</div><div class="ho-code">${unitCode}</div></div>
      <div><div class="ho-time">${timeStr}</div><div class="ho-date">${dateStr}</div></div>
    </div>
    <div class="ho-summary">
      <div class="ho-sum r"><div class="ho-sum-n">${red.length}</div><div class="ho-sum-l">🔴 حرج</div></div>
      <div class="ho-sum a"><div class="ho-sum-n">${amber.length}</div><div class="ho-sum-l">🟡 متابعة</div></div>
      <div class="ho-sum g"><div class="ho-sum-n">${green.length}</div><div class="ho-sum-l">🟢 مستقر</div></div>
      <div class="ho-sum e"><div class="ho-sum-n">${empty}</div><div class="ho-sum-l">⬜ فارغ</div></div>
    </div>
    ${sec('🔴 حرج',red,'r')}
    ${sec('🟡 متابعة',amber,'a')}
    ${sec('🟢 مستقر',green,'g')}
    ${!occupied.length?'<div style="text-align:center;padding:60px;color:var(--dim);font-size:14px">✅ لا يوجد مرضى للتسليم</div>':''}
  `;
}

function shareHandover(){
  const now = new Date();
  const occupied = Object.entries(beds).filter(([,b])=>b.name)
    .sort((a,b)=>({red:0,amber:1,green:2}[a[1].pri]??3)-({red:0,amber:1,green:2}[b[1].pri]??3));
  const priLabel = {red:'🔴 حرج',amber:'🟡 متابعة',green:'🟢 مستقر'};
  let txt = `📋 تسليم شيفت — ${unitName}\n`;
  txt += `🏥 ${unitCode} | ${now.toLocaleDateString('ar-SA')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}\n`;
  txt += `المرضى: ${occupied.length} | فارغ: ${bedCount-occupied.length}\n\n`;
  occupied.forEach(([num,b])=>{
    txt += `سرير ${num}: ${b.name} — ${priLabel[b.pri]||''}\n`;
    if(b.status) txt += `  الوضع: ${b.status}\n`;
    if(b.waiting) txt += `  ننتظر: ${b.waiting}\n`;
    if(b.doctor) txt += `  د. ${b.doctor}\n`;
    txt += '\n';
  });
  if(navigator.share) navigator.share({title:'تسليم الشيفت',text:txt}).catch(()=>{});
  else{
    navigator.clipboard?.writeText(txt).catch(()=>{});
    toast('✓ تم نسخ التسليم');
  }
}

// ══ RECENT UNITS ══
function getRecent(){return JSON.parse(localStorage.getItem('sp_recent')||'[]');}
function saveRecentUnit(code,name){
  let r = getRecent().filter(u=>u.code!==code);
  r.unshift({code,name,lastVisit:new Date().toLocaleDateString('ar-SA')});
  r = r.slice(0,6);
  localStorage.setItem('sp_recent',JSON.stringify(r));
  renderRecent();
}
function renderRecent(){
  const r = getRecent();
  const wrap = document.getElementById('recentWrap');
  const list = document.getElementById('recentList');
  if(!r.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML = r.map(u=>`
    <div class="recent-item" onclick="quickJoin('${u.code}','${u.name}')">
      <div class="recent-icon">🏥</div>
      <div class="recent-info">
        <div class="recent-name">${u.name}</div>
        <div class="recent-code">${u.code} · ${u.lastVisit||''}</div>
      </div>
      <div class="recent-arrow">←</div>
      <div class="recent-del" onclick="delRecent('${u.code}',event)">✕</div>
    </div>`).join('');
}
function delRecent(code,e){
  e.stopPropagation();
  localStorage.setItem('sp_recent',JSON.stringify(getRecent().filter(u=>u.code!==code)));
  renderRecent();
}
function quickJoin(code,name){
  const pass = localStorage.getItem('pass_'+code);
  if(pass){
    document.getElementById('joinCode').value = code;
    document.getElementById('joinPass').value = pass;
    doJoin();
  } else {
    switchTab('join');
    document.getElementById('joinCode').value = code;
    document.getElementById('joinPass').focus();
    toast('أدخل كلمة سر: '+name);
  }
}

// ══ UTILS ══
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function doExit(){
  if(autoTimer) clearInterval(autoTimer);
  switchScreen('setupScreen');
  renderRecent();
}
function showLoading(txt){
  document.getElementById('loadingText').textContent = txt||'جاري التحميل...';
  document.getElementById('loadingScreen').style.display = 'flex';
}
function hideLoading(){
  document.getElementById('loadingScreen').style.display = 'none';
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'),2500);
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', renderRecent);
</script>
</body>
</html>
